<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apontamento de Produção QWD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <!-- Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STOP_CODES = [
            "1 - Intervalo p/ refeição", "2 - Reuniões", "3 - Ausência do Operador", "4 - Limpeza Máquina",
            "5 - Manutenção Corretiva", "6 - Falta de Energia / Ar / água", "7 - Falta de Matéria Prima",
            "8 - Troca e Man de Ferramenta", "9 - Treinamentos", "10 - Falta de Insumos",
            "11 - Ajustamento de Máquina / Setup", "12 - Aguardando Liberação / Inspeção", "13 - Setup (Tempo extra)",
            "14 - Retrabalho", "15 - Falta de Operador", "16 - Deslocamento de Função", "17 - Try Out / Testes",
            "18 - Manutenção Preventiva", "19 - Queda de Rede / Sistema", "20 - Falta de Informação",
            "21 - Problema de Software", "22 - Preparação de Castanhas", "23 - Problemas de Qualidade",
            "24 - Fio Arrebentado", "25 - Afiação de Partes não definidas", "26 - Controle da peça"
        ];

        const formatTime = (dateString) => {
            if (!dateString) return "--:--";
            return new Date(dateString).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second:'2-digit' });
        };

        const formatDate = (dateString) => {
            if (!dateString) return "--/--/----";
            return new Date(dateString).toLocaleDateString('pt-BR');
        };

        const toDateTimeLocal = (isoString) => {
            if (!isoString) return "";
            const d = new Date(isoString);
            return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        };

        function App() {
            // Estado das OPs (Com proteção para bloqueios de navegador local)
            const [jobs, setJobs] = useState(() => {
                try {
                    const saved = localStorage.getItem('qwd_jobs');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });

            // Estado para os Apontamentos Soltos (Com proteção para bloqueios)
            const [globalStops, setGlobalStops] = useState(() => {
                try {
                    const saved = localStorage.getItem('qwd_global_stops');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    return [];
                }
            });

            const [view, setView] = useState('active'); 
            const [activeStopJobId, setActiveStopJobId] = useState(null);
            const [finishingJobId, setFinishingJobId] = useState(null);
            const [editingHistoryJobId, setEditingHistoryJobId] = useState(null);
            const [isGlobalStopOpen, setIsGlobalStopOpen] = useState(false);

            useEffect(() => {
                try {
                    localStorage.setItem('qwd_jobs', JSON.stringify(jobs));
                } catch(e) {}
            }, [jobs]);

            useEffect(() => {
                try {
                    localStorage.setItem('qwd_global_stops', JSON.stringify(globalStops));
                } catch(e) {}
            }, [globalStops]);

            const activeJobs = jobs.filter(j => !j.horaFim);
            const finishedJobs = jobs.filter(j => j.horaFim).sort((a,b) => new Date(b.horaFim) - new Date(a.horaFim));

            const handleDeleteJob = (jobId) => {
                if (window.confirm("Tem certeza que deseja excluir esta OP? Esta ação não pode ser desfeita.")) {
                    setJobs(jobs.filter(j => j.id !== jobId));
                    if (editingHistoryJobId === jobId) setEditingHistoryJobId(null);
                }
            };

            // Componente: Apontamento Solto de Falta de Matéria (Cronômetro Obrigatório)
            const GlobalStopModal = () => {
                const [turno, setTurno] = useState("1");
                const [isRunning, setIsRunning] = useState(false);
                const [elapsedTime, setElapsedTime] = useState(0); 

                const timerRef = React.useRef(null);
                const lastTickRef = React.useRef(null);

                useEffect(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, [isRunning]);

                useEffect(() => {
                    return () => clearInterval(timerRef.current);
                }, []);

                const toggleTimer = () => {
                    if (isRunning) {
                        clearInterval(timerRef.current);
                        setIsRunning(false);
                    } else {
                        lastTickRef.current = Date.now();
                        setIsRunning(true);
                        timerRef.current = setInterval(() => {
                            const now = Date.now();
                            const delta = now - lastTickRef.current;
                            setElapsedTime(prev => prev + delta);
                            lastTickRef.current = now;
                        }, 1000);
                    }
                };

                const resetTimer = () => {
                    clearInterval(timerRef.current);
                    setIsRunning(false);
                    setElapsedTime(0);
                };

                const formatMs = (ms) => {
                    const totalSeconds = Math.floor(ms / 1000);
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                };

                const handleSave = () => {
                    const finalMin = elapsedTime / 60000;

                    if (finalMin <= 0) {
                        alert("O cronômetro precisa registrar algum tempo de parada antes de salvar.");
                        return;
                    }

                    // Força a gravar no mínimo 0.01 se pausou quase instantaneamente
                    const roundedMin = Math.max(0.01, finalMin).toFixed(2);

                    setGlobalStops([...globalStops, {
                        id: Date.now().toString(),
                        data: new Date().toISOString(),
                        turno,
                        minutos: roundedMin
                    }]);
                    setIsGlobalStopOpen(false);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-xl shadow-xl p-5 w-full max-w-sm">
                            <h3 className="text-lg font-bold text-amber-600 mb-2 flex items-center gap-2">
                                <i data-lucide="alert-triangle"></i> Falta de Matéria-Prima
                            </h3>
                            <p className="text-xs text-gray-500 mb-4">
                                Cronometre o tempo exato em que a máquina ficou ociosa aguardando material.
                            </p>
                            
                            <label className="block text-sm font-medium text-gray-700 mb-1">Turno:</label>
                            <select className="w-full border-gray-300 border rounded-lg p-3 mb-4 bg-gray-50"
                                value={turno} onChange={e => setTurno(e.target.value)}>
                                <option value="1">1° Turno</option>
                                <option value="2">2° Turno</option>
                                <option value="3">3° Turno</option>
                            </select>

                            {/* Cronômetro */}
                            <div className="bg-gray-900 rounded-xl p-5 mb-6 text-center shadow-inner">
                                <div className="text-5xl font-mono text-amber-400 font-bold mb-5 tracking-widest">
                                    {formatMs(elapsedTime)}
                                </div>
                                <div className="flex gap-3 justify-center">
                                    {!isRunning ? (
                                        <button onClick={toggleTimer} className="bg-green-600 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 active:bg-green-700 text-sm">
                                            <i data-lucide="play" className="w-5 h-5"></i> Iniciar
                                        </button>
                                    ) : (
                                        <button onClick={toggleTimer} className="bg-amber-500 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 active:bg-amber-600 text-sm">
                                            <i data-lucide="pause" className="w-5 h-5"></i> Pausar
                                        </button>
                                    )}
                                    <button onClick={resetTimer} disabled={elapsedTime === 0 && !isRunning} className="bg-gray-700 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 active:bg-gray-600 text-sm transition-opacity">
                                        <i data-lucide="rotate-ccw" className="w-5 h-5"></i> Zerar
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex gap-3">
                                <button onClick={() => setIsGlobalStopOpen(false)} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-bold">Cancelar</button>
                                <button onClick={handleSave} disabled={isRunning || elapsedTime === 0} className="flex-1 bg-amber-500 text-white p-3 rounded-lg font-bold active:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed transition-opacity">
                                    Salvar Tempo
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // Componente: Formulário de Nova OP
            const NewJobForm = () => {
                const [formData, setFormData] = useState({
                    turno: "1", ordemProducao: "", idFerramenta: "", perfilReta: "Reta", pa: "", qtdPlanejada: ""
                });

                const handleSubmit = (e) => {
                    e.preventDefault();
                    const now = new Date();
                    
                    const newJob = {
                        id: Date.now().toString(),
                        data: now.toISOString(),
                        horaInicio: now.toISOString(),
                        horaFim: null,
                        ...formData,
                        qtdProduzida: "", tempoOp: "", tempoApalpamento: "", tempoAfiacao: "",
                        paradas: [], anotacoes: "", activeStopStart: null
                    };
                    setJobs([newJob, ...jobs]);
                    setView('active');
                };

                return (
                    <div className="p-4 bg-white rounded-xl shadow-sm border border-gray-200">
                        <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i data-lucide="play-circle" className="text-green-600"></i> Iniciar Nova OP
                        </h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Turno</label>
                                    <select className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border" 
                                        value={formData.turno} onChange={e => setFormData({...formData, turno: e.target.value})}>
                                        <option value="1">1° Turno (07:00-15:00)</option>
                                        <option value="2">2° Turno (15:00-23:30)</option>
                                        <option value="3">3° Turno (23:30-07:00)</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Perfil / Reta</label>
                                    <select className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.perfilReta} onChange={e => setFormData({...formData, perfilReta: e.target.value})}>
                                        <option>Reta</option>
                                        <option>Perfil</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Ordem de Produção</label>
                                <input type="text" enterKeyHint="next" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                    value={formData.ordemProducao} onChange={e => setFormData({...formData, ordemProducao: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">ID Ferramenta</label>
                                    <input type="text" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.idFerramenta} onChange={e => setFormData({...formData, idFerramenta: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">PA</label>
                                    <input type="text" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.pa} onChange={e => setFormData({...formData, pa: e.target.value})} />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 leading-tight">Qtd. Planejada (OP)</label>
                                <input type="number" inputMode="numeric" enterKeyHint="done" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                    value={formData.qtdPlanejada} onChange={e => setFormData({...formData, qtdPlanejada: e.target.value})} />
                            </div>

                            <div className="pt-4 flex gap-3">
                                <button type="button" onClick={() => setView('active')} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-semibold">Cancelar</button>
                                <button type="submit" className="flex-1 bg-green-600 text-white p-3 rounded-lg font-semibold">Iniciar Agora</button>
                            </div>
                        </form>
                    </div>
                );
            };

            // Modal para Adicionar Parada
            const StopModal = () => {
                const [stopCode, setStopCode] = useState(STOP_CODES[0]);
                const [duration, setDuration] = useState("");
                
                const handleSaveStop = () => {
                    if (!duration || duration <= 0) {
                        alert("Informe os minutos."); return;
                    }
                    setJobs(jobs.map(j => {
                        if(j.id === activeStopJobId) {
                            const fim = new Date();
                            const inicio = new Date(fim.getTime() - duration * 60000);
                            return {
                                ...j,
                                paradas: [...j.paradas, {
                                    cod: stopCode.split(" - ")[0],
                                    desc: stopCode,
                                    inicio: inicio.toISOString(),
                                    fim: fim.toISOString(),
                                    minutos: duration
                                }]
                            };
                        }
                        return j;
                    }));
                    setActiveStopJobId(null);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-xl shadow-xl p-5 w-full max-w-sm">
                            <h3 className="text-lg font-bold text-gray-800 mb-2">Registrar Parada</h3>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Motivo:</label>
                            <select className="w-full border-gray-300 border rounded-lg p-3 mb-4 bg-gray-50"
                                value={stopCode} onChange={e => setStopCode(e.target.value)}>
                                {STOP_CODES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Tempo (min):</label>
                            <input type="text" inputMode="decimal" enterKeyHint="done" className="w-full border-gray-300 border rounded-lg p-3 mb-6 bg-gray-50"
                                placeholder="Ex: 15" value={duration} onChange={e => setDuration(e.target.value)} />
                            <div className="flex gap-3">
                                <button onClick={() => setActiveStopJobId(null)} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-bold">Cancelar</button>
                                <button onClick={handleSaveStop} className="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold">Salvar</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const calculateTimeDiff = (horaIni, horaFim, apalp, afiac, qtd, paradasArr) => {
                const start = new Date(horaIni);
                const end = new Date(horaFim);
                const realTime = (end - start) / 60000; 
                
                const valApalp = parseFloat(String(apalp).replace(',', '.')) || 0;
                const valAfiac = parseFloat(String(afiac).replace(',', '.')) || 0;
                const valQtd = parseFloat(qtd) || 0;
                const paradasMin = paradasArr.reduce((acc, p) => acc + (parseFloat(p.minutos) || 0), 0);

                const calcTime = ((valApalp + valAfiac) * valQtd) + paradasMin;
                return {
                    realTime, calcTime, diff: Math.abs(realTime - calcTime)
                };
            };

            // Modal para Finalizar Ordem
            const FinishJobModal = () => {
                const job = jobs.find(j => j.id === finishingJobId);
                const [finalData, setFinalData] = useState({
                    horaFim: new Date().toISOString(),
                    qtdProduzida: job.qtdProduzida || "", 
                    tempoOp: job.tempoOp || "", 
                    tempoApalpamento: job.tempoApalpamento || "", 
                    tempoAfiacao: job.tempoAfiacao || "", 
                    anotacoes: job.anotacoes || "",
                    paradas: job.paradas || []
                });

                useEffect(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, [finalData.paradas]);

                const times = calculateTimeDiff(
                    job.horaInicio, finalData.horaFim, 
                    finalData.tempoApalpamento, finalData.tempoAfiacao, finalData.qtdProduzida, finalData.paradas
                );
                const isValid = times.diff <= 5;

                const handleFinish = (e) => {
                    e.preventDefault();
                    if (!isValid) {
                        alert("O tempo justificado ultrapassa o limite de 5 minutos de diferença do tempo real. Verifique e ajuste os dados antes de finalizar.");
                        return;
                    }
                    
                    setJobs(jobs.map(j => {
                        if(j.id === finishingJobId) {
                            return { ...j, ...finalData, activeStopStart: null };
                        }
                        return j;
                    }));
                    setFinishingJobId(null);
                };

                const handleParadaChange = (index, field, value) => {
                    const newParadas = [...finalData.paradas];
                    if (field === 'desc') {
                        newParadas[index].desc = value;
                        newParadas[index].cod = value.split(" - ")[0];
                    } else {
                        newParadas[index][field] = value;
                    }
                    setFinalData({ ...finalData, paradas: newParadas });
                };

                const handleRemoveParada = (index) => {
                    const newParadas = finalData.paradas.filter((_, i) => i !== index);
                    setFinalData({ ...finalData, paradas: newParadas });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow-xl p-4 w-full max-w-sm my-auto">
                            <h3 className="text-lg font-bold text-gray-800 mb-1">Finalizar Produção</h3>
                            <p className="text-sm text-gray-500 mb-4">OP: {job.ordemProducao}</p>
                            
                            <div className={`p-3 rounded-lg mb-4 text-xs border ${isValid ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-300 text-red-800'}`}>
                                <p className="font-bold mb-1 flex items-center gap-1">
                                    <i data-lucide={isValid ? "check-circle" : "alert-circle"} className="w-4 h-4"></i>
                                    {isValid ? "Validação de Tempo OK" : "Diferença > 5 minutos!"}
                                </p>
                                <div className="grid grid-cols-3 gap-1 mt-2 text-center">
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">T. Real</span>
                                        <span className="font-bold">{times.realTime.toFixed(0)}m</span>
                                    </div>
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">Justificado</span>
                                        <span className="font-bold">{times.calcTime.toFixed(0)}m</span>
                                    </div>
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">Diferença</span>
                                        <span className="font-bold">{times.diff.toFixed(0)}m</span>
                                    </div>
                                </div>
                            </div>

                            <form onSubmit={handleFinish} className="space-y-3">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700">Hora Término (Editável)</label>
                                    <input type="datetime-local" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={toDateTimeLocal(finalData.horaFim)} onChange={e => setFinalData({...finalData, horaFim: new Date(e.target.value).toISOString()})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Qtd. Produzida</label>
                                    <input type="number" inputMode="numeric" enterKeyHint="next" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border focus:border-blue-500 focus:ring-blue-500"
                                        value={finalData.qtdProduzida} onChange={e => setFinalData({...finalData, qtdProduzida: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">T. OP (min)</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoOp} onChange={e => setFinalData({...finalData, tempoOp: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">Apalpamento</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoApalpamento} onChange={e => setFinalData({...finalData, tempoApalpamento: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">Afiação Real</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoAfiacao} onChange={e => setFinalData({...finalData, tempoAfiacao: e.target.value})} />
                                    </div>
                                </div>

                                <div className="mt-4 pt-3 border-t border-gray-200">
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Paradas Registradas</h4>
                                    {finalData.paradas.length === 0 ? (
                                        <p className="text-[11px] text-gray-500 italic">Nenhuma parada registrada.</p>
                                    ) : (
                                        <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                                            {finalData.paradas.map((p, index) => (
                                                <div key={index} className="bg-gray-50 p-2 rounded border border-gray-200 relative">
                                                    <button type="button" onClick={() => handleRemoveParada(index)} className="absolute top-1 right-1 text-red-500 hover:text-red-700" title="Excluir parada">
                                                        <i data-lucide="x-circle" className="w-4 h-4"></i>
                                                    </button>
                                                    <div className="grid grid-cols-4 gap-2 mr-6">
                                                        <div className="col-span-3">
                                                            <label className="block text-[10px] font-medium text-gray-700">Motivo</label>
                                                            <select className="mt-1 w-full rounded border-gray-300 bg-white p-1 text-[11px] border"
                                                                value={p.desc} onChange={e => handleParadaChange(index, 'desc', e.target.value)}>
                                                                {STOP_CODES.map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                        </div>
                                                        <div className="col-span-1">
                                                            <label className="block text-[10px] font-medium text-gray-700">Min</label>
                                                            <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-white p-1 text-[11px] border"
                                                                value={p.minutos} onChange={e => handleParadaChange(index, 'minutos', e.target.value)} />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                    e.preventDefault();
                    setJobs(jobs.map(j => j.id === editingHistoryJobId ? editData : j));
                    setEditingHistoryJobId(null);
                };

                const handleParadaChange = (index, field, value) => {
                    const newParadas = [...editData.paradas];
                    if (field === 'desc') {
                        newParadas[index].desc = value;
                        newParadas[index].cod = value.split(" - ")[0];
                    } else {
                        newParadas[index][field] = value;
                    }
                    setEditData({ ...editData, paradas: newParadas });
                };

                const handleRemoveParada = (index) => {
                    const newParadas = editData.paradas.filter((_, i) => i !== index);
                    setEditData({ ...editData, paradas: newParadas });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow-xl p-4 w-full max-w-sm my-auto">
                            <h3 className="text-lg font-bold text-gray-800 mb-1">Editar OP: {job.ordemProducao}</h3>
                            <form onSubmit={handleSave} className="space-y-3 mt-4">
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[11px] font-medium text-gray-700">Hora Início</label>
                                        <input type="datetime-local" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 text-xs border"

                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-medium text-gray-700">Hora Fim</label>
                                        <input type="datetime-local" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 text-xs border"
                                            value={toDateTimeLocal(editData.horaFim)} onChange={e => setEditData({...editData, horaFim: new Date(e.target.value).toISOString()})} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-[11px] font-medium text-gray-700">Qtd. Planejada</label>
                                        <input type="number" inputMode="numeric" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 border"
                                            value={editData.qtdPlanejada} onChange={e => setEditData({...editData, qtdPlanejada: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-medium text-gray-700">Qtd. Produzida</label>
                                        <input type="number" inputMode="numeric" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 border"
                                            value={editData.qtdProduzida} onChange={e => setEditData({...editData, qtdProduzida: e.target.value})} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">T. OP</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 border text-xs"
                                            value={editData.tempoOp} onChange={e => setEditData({...editData, tempoOp: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">T. Apalp.</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 border text-xs"
                                            value={editData.tempoApalpamento} onChange={e => setEditData({...editData, tempoApalpamento: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">T. Afiac.</label>
                                        <input type="text" inputMode="decimal" enterKeyHint="next" className="mt-1 w-full rounded border-gray-300 bg-gray-50 p-2 border text-xs"
                                            value={editData.tempoAfiacao} onChange={e => setEditData({...editData, tempoAfiacao: e.target.value})} />
                                    </div>
                                </div>

                                <div className="mt-4 pt-3 border-t border-gray-200">
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Paradas Registradas</h4>
                                    {editData.paradas.length === 0 ? (
                                        <p className="text-[11px] text-gray-500 italic">Nenhuma parada registrada.</p>
                                    ) : (
                                        <div className="space-y-2 max-h-40 overflow-y-auto pr-1">

                                                    <button type="button" onClick={() => handleRemoveParada(index)} className="absolute top-1 right-1 text-red-500 hover:text-red-700" title="Excluir parada">

                                                            <label className="block text-[10px] font-medium text-gray-700">Min</label>

            // Exportar para CSV Excel Brasil
            const exportToCSV = () => {
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                
                csvContent += "Data;Turno;Ordem de Produção;ID Ferramenta;Perfil / Reta;PA;Hora Inicio Produção;Quantidade Planejada (OP);Quantidade Produzida;Tempo da OP;Tempo de Apalpamento;Tempo de Afiação Real;Parada 1 - Cód;Parada 1 - T. Inicio;Parada 1 - T.Fim;Parada 2 - Cód;Parada 2 - T. Inicio;Parada 2 - T.Fim;Hora Fim Produção;Anotações\n";

                    const p1 = job.paradas[0] || {cod:'', inicio:'', fim:''};
                    const p2 = job.paradas[1] || {cod:'', inicio:'', fim:''};

                    const notas = (job.anotacoes || '').replace(/;/g, ',').replace(/\n/g, ' ');

                        job.turno,
                        job.ordemProducao,
                        job.idFerramenta,
                        job.perfilReta,
                        job.pa,
                        formatTime(job.horaInicio),
                        job.qtdPlanejada,
                        job.qtdProduzida,

                        job.tempoAfiacao,

                        p2.cod, formatTime(p2.inicio), formatTime(p2.fim),
                        formatTime(job.horaFim),
                        notas
                    ].join(";");
                    
                    csvContent += row + "\n";

                        const d = new Date(gs.data).toLocaleDateString('pt-BR');
                        csvContent += `${d};${gs.turno};${gs.minutos}\n`;
                    });
                }

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Controle_QWD_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, activeJobs, finishedJobs, activeStopJobId, finishingJobId, editingHistoryJobId, jobs, isGlobalStopOpen, globalStops]);

            const histSummary = {

                tempoTotal: finishedJobs.reduce((acc, j) => acc + ((new Date(j.horaFim) - new Date(j.horaInicio))/60000), 0)
            };

                                    </div>

                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded border">T{job.turno}</span>

                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="text-sm text-gray-600 mb-4 grid grid-cols-2 gap-2">
                                                <p><i data-lucide="clock" className="inline w-4 h-4 mr-1"></i> Início: <span className="font-semibold text-gray-800">{formatTime(job.horaInicio)}</span></p>
                                                <p><i data-lucide="target" className="inline w-4 h-4 mr-1"></i> Plan: <span className="font-semibold text-gray-800">{job.qtdPlanejada}</span></p>
                                            </div>

                                            <div className="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200 grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">Qtd. Produzida</label>
                                                    <input type="number" inputMode="numeric" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.qtdProduzida} 
                                                        onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, qtdProduzida: e.target.value} : j))} />

                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">Tempo OP (min)</label>
                                                    <input type="text" inputMode="decimal" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.tempoOp} 
                                                        onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, tempoOp: e.target.value} : j))} />

                                                <div>

                                            {job.paradas.length > 0 && (

                                                    <ul className="text-xs text-gray-600 space-y-1">

                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setView('active')} className={`flex flex-col items-center p-2 w-full ${view === 'active' || view === 'new' ? 'text-blue-600' : 'text-gray-500'}`}>
                            <i data-lucide="play" className="w-6 h-6 mb-1"></i>
                            <span className="text-xs font-semibold">Rodando</span>
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center p-2 w-full ${view === 'history' ? 'text-blue-600' : 'text-gray-500'}`}>
                            <i data-lucide="history" className="w-6 h-6 mb-1"></i>
                            <span className="text-xs font-semibold">Histórico</span>
                        </button>
                    </nav>

                    {isGlobalStopOpen && <GlobalStopModal />}
                    {activeStopJobId && <StopModal />}
                    {finishingJobId && <FinishJobModal />}
                    {editingHistoryJobId && <EditHistoryModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
