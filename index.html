<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apontamento de Produção QWD</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <!-- Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(2px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 75px); } 
        .excel-table td, .excel-table th { border: 1px solid #d1d5db; padding: 4px 8px; }
        .excel-table th { background-color: #f3f4f6; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STOP_CODES = [
            "1 - Intervalo p/ refeição", "2 - Reuniões", "3 - Ausência do Operador", "4 - Limpeza Máquina",
            "5 - Manutenção Corretiva", "6 - Falta de Energia / Ar / água", "7 - Falta de Matéria Prima",
            "8 - Troca e Man de Ferramenta", "9 - Treinamentos", "10 - Falta de Insumos",
            "11 - Ajustamento de Máquina / Setup", "12 - Aguardando Liberação / Inspeção", "13 - Setup (Tempo extra)",
            "14 - Retrabalho", "15 - Falta de Operador", "16 - Deslocamento de Função", "17 - Try Out / Testes",
            "18 - Manutenção Preventiva", "19 - Queda de Rede / Sistema", "20 - Falta de Informação",
            "21 - Problema de Software", "22 - Preparação de Castanhas", "23 - Problemas de Qualidade",
            "24 - Fio Arrebentado", "25 - Afiação de Partes não definidas", "26 - Controle da peça"
        ];

        const formatTime = (dateString) => {
            if (!dateString) return "--:--";
            return new Date(dateString).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second:'2-digit' });
        };

        const formatDate = (dateString) => {
            if (!dateString) return "--/--/----";
            return new Date(dateString).toLocaleDateString('pt-BR');
        };

        const toDateTimeLocal = (isoString) => {
            if (!isoString) return "";
            const d = new Date(isoString);
            return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
        };

        const calculateTimePerShift = (startISO, endISO, shifts) => {
            let start = new Date(startISO);
            let end = new Date(endISO);
            if (isNaN(start) || isNaN(end) || start >= end) return {};

            const shiftTimes = {};
            shifts.forEach(s => shiftTimes[s.name] = 0);

            let current = new Date(start);
            while (current < end) {
                let nextMin = new Date(current.getTime() + 60000);
                if (nextMin > end) nextMin = end;
                const deltaMins = (nextMin - current) / 60000;

                const currMins = current.getHours() * 60 + current.getMinutes();
                
                for (let s of shifts) {
                    if(!s.start || !s.end) continue;
                    const sStart = parseInt(s.start.split(':')[0])*60 + parseInt(s.start.split(':')[1]);
                    const sEnd = parseInt(s.end.split(':')[0])*60 + parseInt(s.end.split(':')[1]);

                    let isActive = false;
                    if (sStart <= sEnd) {
                        isActive = currMins >= sStart && currMins < sEnd; 
                    } else {
                        isActive = currMins >= sStart || currMins < sEnd; 
                    }

                    if (isActive) {
                        shiftTimes[s.name] += deltaMins;
                        break; 
                    }
                }
                current = nextMin;
            }
            return shiftTimes;
        };

        function App() {
            const defaultSettings = {
                machineName: "QWD",
                shifts: [
                    { id: "1", name: "1° Turno", start: "07:00", end: "15:00" },
                    { id: "2", name: "2° Turno", start: "15:00", end: "23:30" },
                    { id: "3", name: "3° Turno", start: "23:30", end: "07:00" }
                ]
            };

            const [settings, setSettings] = useState(() => {
                try { const saved = localStorage.getItem('qwd_settings'); return saved ? JSON.parse(saved) : defaultSettings; } 
                catch (e) { return defaultSettings; }
            });

            const [jobs, setJobs] = useState(() => {
                try { const saved = localStorage.getItem('qwd_jobs'); return saved ? JSON.parse(saved) : []; } 
                catch (e) { return []; }
            });

            const [globalStops, setGlobalStops] = useState(() => {
                try { const saved = localStorage.getItem('qwd_global_stops'); return saved ? JSON.parse(saved) : []; } 
                catch (e) { return []; }
            });

            const [view, setView] = useState('active'); // active, history, analysis, oee, settings, new
            const [activeStopJobId, setActiveStopJobId] = useState(null);
            const [finishingJobId, setFinishingJobId] = useState(null);
            const [editingHistoryJobId, setEditingHistoryJobId] = useState(null);
            const [editingGlobalStopId, setEditingGlobalStopId] = useState(null);
            const [isGlobalStopOpen, setIsGlobalStopOpen] = useState(false);

            const fileInputRef = useRef(null);

            useEffect(() => { localStorage.setItem('qwd_settings', JSON.stringify(settings)); }, [settings]);
            useEffect(() => { localStorage.setItem('qwd_jobs', JSON.stringify(jobs)); }, [jobs]);
            useEffect(() => { localStorage.setItem('qwd_global_stops', JSON.stringify(globalStops)); }, [globalStops]);

            const activeJobs = jobs.filter(j => !j.horaFim);
            const finishedJobs = jobs.filter(j => j.horaFim).sort((a,b) => new Date(b.horaFim) - new Date(a.horaFim));

            const handleDeleteJob = (jobId) => {
                if (window.confirm("Tem certeza que deseja excluir esta OP? Esta ação não pode ser desfeita.")) {
                    setJobs(jobs.filter(j => j.id !== jobId));
                    if (editingHistoryJobId === jobId) setEditingHistoryJobId(null);
                }
            };

            // MODAIS
            const GlobalStopModal = () => {
                const [isRunning, setIsRunning] = useState(false);
                const [elapsedTime, setElapsedTime] = useState(0); 
                const [startTime, setStartTime] = useState(null);
                const timerRef = React.useRef(null);
                const lastTickRef = React.useRef(null);

                useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [isRunning]);
                useEffect(() => { return () => clearInterval(timerRef.current); }, []);

                const toggleTimer = () => {
                    if (isRunning) {
                        clearInterval(timerRef.current);
                        setIsRunning(false);
                    } else {
                        if(elapsedTime === 0) setStartTime(new Date().toISOString());
                        lastTickRef.current = Date.now();
                        setIsRunning(true);
                        timerRef.current = setInterval(() => {
                            const now = Date.now();
                            const delta = now - lastTickRef.current;
                            setElapsedTime(prev => prev + delta);
                            lastTickRef.current = now;
                        }, 1000);
                    }
                };

                const resetTimer = () => {
                    clearInterval(timerRef.current);
                    setIsRunning(false);
                    setElapsedTime(0);
                    setStartTime(null);
                };

                const formatMs = (ms) => {
                    const totalSeconds = Math.floor(ms / 1000);
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    return `${h > 0 ? h.toString().padStart(2, '0') + ':' : ''}${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                };

                const handleSave = () => {
                    const finalMin = elapsedTime / 60000;
                    if (finalMin <= 0) { alert("Registre algum tempo primeiro."); return; }
                    const roundedMin = Math.max(0.01, finalMin).toFixed(2);
                    const endTime = new Date().toISOString();
                    const tempoPorTurno = calculateTimePerShift(startTime, endTime, settings.shifts);

                    setGlobalStops([...globalStops, {
                        id: Date.now().toString(),
                        data: startTime,
                        horaFim: endTime,
                        minutos: roundedMin,
                        tempoPorTurno: tempoPorTurno
                    }]);
                    setIsGlobalStopOpen(false);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-xl shadow-xl p-5 w-full max-w-sm">
                            <h3 className="text-lg font-bold text-amber-600 mb-2 flex items-center gap-2">
                                <i data-lucide="alert-triangle"></i> Falta de Matéria-Prima
                            </h3>
                            <p className="text-xs text-gray-500 mb-4">Cronometre o tempo exato em que a máquina ficou ociosa.</p>

                            <div className="bg-gray-900 rounded-xl p-5 mb-6 text-center shadow-inner">
                                <div className="text-5xl font-mono text-amber-400 font-bold mb-5 tracking-widest">{formatMs(elapsedTime)}</div>
                                <div className="flex gap-3 justify-center">
                                    {!isRunning ? (
                                        <button onClick={toggleTimer} className="bg-green-600 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 text-sm">
                                            <i data-lucide="play" className="w-5 h-5"></i> Iniciar
                                        </button>
                                    ) : (
                                        <button onClick={toggleTimer} className="bg-amber-500 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 text-sm">
                                            <i data-lucide="pause" className="w-5 h-5"></i> Pausar
                                        </button>
                                    )}
                                    <button onClick={resetTimer} disabled={elapsedTime === 0 && !isRunning} className="bg-gray-700 text-white px-5 py-3 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 text-sm">
                                        <i data-lucide="rotate-ccw" className="w-5 h-5"></i> Zerar
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex gap-3">
                                <button onClick={() => setIsGlobalStopOpen(false)} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-bold">Cancelar</button>
                                <button onClick={handleSave} disabled={isRunning || elapsedTime === 0} className="flex-1 bg-amber-500 text-white p-3 rounded-lg font-bold disabled:opacity-50">Salvar Tempo</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const NewJobForm = () => {
                const [formData, setFormData] = useState({ ordemProducao: "", idFerramenta: "", perfilReta: "Reta", pa: "", qtdPlanejada: "" });

                const handleSubmit = (e) => {
                    e.preventDefault();
                    const now = new Date();
                    const newJob = {
                        id: Date.now().toString(),
                        data: now.toISOString(), horaInicio: now.toISOString(), horaFim: null,
                        ...formData,
                        qtdProduzida: "", tempoOp: "", tempoApalpamento: "", tempoAfiacao: "",
                        paradas: [], anotacoes: "", tempoPorTurno: {}
                    };
                    setJobs([newJob, ...jobs]);
                    setView('active');
                };

                return (
                    <div className="p-4 bg-white rounded-xl shadow-sm border border-gray-200">
                        <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i data-lucide="play-circle" className="text-green-600"></i> Iniciar Nova OP
                        </h2>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700">Ordem de Produção</label>
                                <input type="text" enterKeyHint="next" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border text-lg font-bold"
                                    value={formData.ordemProducao} onChange={e => setFormData({...formData, ordemProducao: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">ID Ferramenta</label>
                                    <input type="text" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.idFerramenta} onChange={e => setFormData({...formData, idFerramenta: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Perfil / Reta</label>
                                    <select className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.perfilReta} onChange={e => setFormData({...formData, perfilReta: e.target.value})}>
                                        <option>Reta</option><option>Perfil</option>
                                    </select>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 leading-tight">Qtd. Planejada</label>
                                    <input type="number" inputMode="numeric" pattern="[0-9]*" enterKeyHint="done" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.qtdPlanejada} onChange={e => setFormData({...formData, qtdPlanejada: e.target.value})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">PA</label>
                                    <input type="text" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={formData.pa} onChange={e => setFormData({...formData, pa: e.target.value})} />
                                </div>
                            </div>
                            <p className="text-[10px] text-gray-400 text-center uppercase tracking-widest mt-2">O turno será calculado automaticamente ao finalizar.</p>
                            <div className="pt-4 flex gap-3">
                                <button type="button" onClick={() => setView('active')} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-semibold">Cancelar</button>
                                <button type="submit" className="flex-1 bg-green-600 text-white p-3 rounded-lg font-semibold shadow-md active:bg-green-700">Iniciar Agora</button>
                            </div>
                        </form>
                    </div>
                );
            };

            const StopModal = () => {
                const [stopCode, setStopCode] = useState(STOP_CODES[0]);
                const [duration, setDuration] = useState("");
                
                const handleSaveStop = () => {
                    if (!duration || duration <= 0) { alert("Informe os minutos."); return; }
                    setJobs(jobs.map(j => {
                        if(j.id === activeStopJobId) {
                            const fim = new Date();
                            const inicio = new Date(fim.getTime() - duration * 60000);
                            return {
                                ...j,
                                paradas: [...j.paradas, {
                                    cod: stopCode.split(" - ")[0], desc: stopCode,
                                    inicio: inicio.toISOString(), fim: fim.toISOString(),
                                    minutos: duration
                                }]
                            };
                        }
                        return j;
                    }));
                    setActiveStopJobId(null);
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-xl shadow-xl p-5 w-full max-w-sm">
                            <h3 className="text-lg font-bold text-gray-800 mb-2">Registrar Parada</h3>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Motivo:</label>
                            <select className="w-full border-gray-300 border rounded-lg p-3 mb-4 bg-gray-50 text-sm"
                                value={stopCode} onChange={e => setStopCode(e.target.value)}>
                                {STOP_CODES.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Tempo (min):</label>
                            <input type="number" inputMode="decimal" step="any" enterKeyHint="done" className="w-full border-gray-300 border rounded-lg p-3 mb-6 bg-gray-50"
                                placeholder="Ex: 15" value={duration} onChange={e => setDuration(e.target.value)} />
                            <div className="flex gap-3">
                                <button onClick={() => setActiveStopJobId(null)} className="flex-1 bg-gray-200 text-gray-800 p-3 rounded-lg font-bold">Cancelar</button>
                                <button onClick={handleSaveStop} className="flex-1 bg-blue-600 text-white p-3 rounded-lg font-bold">Salvar</button>
                            </div>
                        </div>
                    </div>
                );
            };

            const calculateTimeDiff = (horaIni, horaFim, apalp, afiac, qtd, paradasArr) => {
                const start = new Date(horaIni);
                const end = new Date(horaFim);
                const realTime = (end - start) / 60000; 
                const valApalp = parseFloat(String(apalp).replace(',', '.')) || 0;
                const valAfiac = parseFloat(String(afiac).replace(',', '.')) || 0;
                const valQtd = parseFloat(qtd) || 0;
                const paradasMin = paradasArr.reduce((acc, p) => acc + (parseFloat(p.minutos) || 0), 0);
                const calcTime = ((valApalp + valAfiac) * valQtd) + paradasMin;
                return { realTime, calcTime, diff: Math.abs(realTime - calcTime) };
            };

            const FinishJobModal = () => {
                const job = jobs.find(j => j.id === finishingJobId);
                const [finalData, setFinalData] = useState({
                    horaFim: new Date().toISOString(),
                    qtdProduzida: job.qtdProduzida || "", tempoOp: job.tempoOp || "", 
                    tempoApalpamento: job.tempoApalpamento || "", tempoAfiacao: job.tempoAfiacao || "", 
                    anotacoes: job.anotacoes || "", paradas: job.paradas || []
                });

                useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [finalData.paradas]);

                const times = calculateTimeDiff(job.horaInicio, finalData.horaFim, finalData.tempoApalpamento, finalData.tempoAfiacao, finalData.qtdProduzida, finalData.paradas);
                const isValid = times.diff <= 5;

                const handleFinish = (e) => {
                    e.preventDefault();
                    if (!isValid) { alert("O tempo justificado ultrapassa o limite de 5 minutos de diferença do tempo real."); return; }
                    const tempoPorTurno = calculateTimePerShift(job.horaInicio, finalData.horaFim, settings.shifts);
                    setJobs(jobs.map(j => {
                        if(j.id === finishingJobId) return { ...j, ...finalData, tempoPorTurno };
                        return j;
                    }));
                    setFinishingJobId(null);
                };

                const handleParadaChange = (index, field, value) => {
                    const newParadas = [...finalData.paradas];
                    if (field === 'desc') {
                        newParadas[index].desc = value;
                        newParadas[index].cod = value.split(" - ")[0];
                    } else newParadas[index][field] = value;
                    setFinalData({ ...finalData, paradas: newParadas });
                };

                const handleRemoveParada = (index) => {
                    const newParadas = finalData.paradas.filter((_, i) => i !== index);
                    setFinalData({ ...finalData, paradas: newParadas });
                };

                return (
                    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow-xl p-4 w-full max-w-sm my-auto">
                            <h3 className="text-lg font-bold text-gray-800 mb-1">Finalizar Produção</h3>
                            <p className="text-sm text-gray-500 mb-4">OP: <span className="font-bold text-gray-800">{job.ordemProducao}</span></p>
                            
                            <div className={`p-3 rounded-lg mb-4 text-xs border ${isValid ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-300 text-red-800'}`}>
                                <p className="font-bold mb-1 flex items-center gap-1">
                                    <i data-lucide={isValid ? "check-circle" : "alert-circle"} className="w-4 h-4"></i>
                                    {isValid ? "Validação de Tempo OK" : "Diferença > 5 minutos!"}
                                </p>
                                <div className="grid grid-cols-3 gap-1 mt-2 text-center">
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">T. Real</span>
                                        <span className="font-bold">{times.realTime.toFixed(0)}m</span>
                                    </div>
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">Justificado</span>
                                        <span className="font-bold">{times.calcTime.toFixed(0)}m</span>
                                    </div>
                                    <div className="bg-white/50 p-1 rounded">
                                        <span className="block text-[10px] uppercase opacity-70">Diferença</span>
                                        <span className="font-bold">{times.diff.toFixed(0)}m</span>
                                    </div>
                                </div>
                            </div>

                            <form onSubmit={handleFinish} className="space-y-3">
                                <div>
                                    <label className="block text-xs font-medium text-gray-700">Hora Término (Editável)</label>
                                    <input type="datetime-local" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                        value={toDateTimeLocal(finalData.horaFim)} onChange={e => setFinalData({...finalData, horaFim: new Date(e.target.value).toISOString()})} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Qtd. Produzida</label>
                                    <input type="number" inputMode="numeric" pattern="[0-9]*" enterKeyHint="next" required className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border focus:border-blue-500 focus:ring-blue-500"
                                        value={finalData.qtdProduzida} onChange={e => setFinalData({...finalData, qtdProduzida: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">T. OP (min)</label>
                                        <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoOp} onChange={e => setFinalData({...finalData, tempoOp: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">Apalpamento</label>
                                        <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoApalpamento} onChange={e => setFinalData({...finalData, tempoApalpamento: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-medium text-gray-700">Afiação Real</label>
                                        <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-50 p-2 border"
                                            value={finalData.tempoAfiacao} onChange={e => setFinalData({...finalData, tempoAfiacao: e.target.value})} />
                                    </div>
                                </div>

                                <div className="mt-4 pt-3 border-t border-gray-200">
                                    <h4 className="text-xs font-bold text-gray-700 mb-2">Paradas Registradas</h4>
                                    {finalData.paradas.length === 0 ? (
                                        <p className="text-[11px] text-gray-500 italic">Nenhuma parada registrada.</p>
                                    ) : (
                                        <div className="space-y-2 max-h-32 overflow-y-auto pr-1">
                                            {finalData.paradas.map((p, index) => (
                                                <div key={index} className="bg-gray-50 p-2 rounded border border-gray-200 relative">
                                                    <button type="button" onClick={() => handleRemoveParada(index)} className="absolute top-1 right-1 text-red-500 hover:text-red-700" title="Excluir parada">
                                                        <i data-lucide="x-circle" className="w-4 h-4"></i>
                                                    </button>
                                                    <div className="grid grid-cols-4 gap-2 mr-6">
                                                        <div className="col-span-3">
                                                            <label className="block text-[10px] font-medium text-gray-700">Motivo</label>
                                                            <select className="mt-1 w-full rounded border-gray-300 bg-white p-1 text-[11px] border"
