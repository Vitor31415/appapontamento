            // COMPONENTE: ANÁLISE DE PARADAS
            const AnalysisView = () => {
                const [filterStart, setFilterStart] = useState("");
                const [filterEnd, setFilterEnd] = useState("");
                const [filterShift, setFilterShift] = useState("");

                const allStops = [];
                
                finishedJobs.forEach(job => {
                    (job.paradas || []).forEach(p => {
                        const startISO = p.inicio || job.horaInicio;
                        
                        if (p.inicio && p.fim) {
                            const shiftDist = calculateTimePerShift(p.inicio, p.fim, settings.shifts);
                            Object.entries(shiftDist).forEach(([shiftName, mins]) => {
                                if (mins > 0) {
                                    allStops.push({
                                        code: p.cod, desc: p.desc, rawDate: startISO, date: new Date(startISO).toLocaleDateString('pt-BR'),
                                        shift: shiftName, mins: mins
                                    });
                                }
                            });
                        } else {
                            allStops.push({
                                code: p.cod, desc: p.desc, rawDate: startISO, date: new Date(startISO).toLocaleDateString('pt-BR'),
                                shift: settings.shifts[0]?.name || "T1", mins: parseFloat(p.minutos) || 0
                            });
                        }
                    });
                });

                globalStops.forEach(gs => {
                    const shiftDist = gs.tempoPorTurno || calculateTimePerShift(gs.data, gs.horaFim, settings.shifts);
                    Object.entries(shiftDist).forEach(([shiftName, mins]) => {
                        if (mins > 0) {
                            allStops.push({
                                code: "7", desc: "7 - Falta de Matéria Prima", rawDate: gs.data, date: new Date(gs.data).toLocaleDateString('pt-BR'),
                                shift: shiftName, mins: mins
                            });
                        }
                    });
                });

                const filteredStops = allStops.filter(s => {
                    if (filterStart && new Date(s.rawDate) < new Date(filterStart + 'T00:00:00')) return false;
                    if (filterEnd && new Date(s.rawDate) > new Date(filterEnd + 'T23:59:59')) return false;
                    if (filterShift && s.shift !== filterShift) return false;
                    return true;
                });

                const totalGeral = filteredStops.reduce((sum, s) => sum + s.mins, 0);

                const uniqueDates = [...new Set(filteredStops.map(s => s.date))].sort((a, b) => {
                    const [d1, m1, y1] = a.split('/'); const [d2, m2, y2] = b.split('/');
                    return new Date(y1, m1-1, d1) - new Date(y2, m2-1, d2);
                });
                
                const shiftsConfig = filterShift ? [filterShift] : settings.shifts.map(s => s.name);

                const rowData = STOP_CODES.map(desc => {
                    const codeStops = filteredStops.filter(s => s.desc === desc);
                    const totalMins = codeStops.reduce((sum, s) => sum + s.mins, 0);
                    const percent = totalGeral > 0 ? (totalMins / totalGeral) * 100 : 0;
                    const dateShiftVals = {};
                    uniqueDates.forEach(date => {
                        shiftsConfig.forEach(shiftName => {
                            const cellMins = codeStops.filter(s => s.date === date && s.shift === shiftName).reduce((sum, s) => sum + s.mins, 0);
                            dateShiftVals[`${date}_${shiftName}`] = cellMins;
                        });
                    });
                    return { desc, totalMins, percent, dateShiftVals };
                });

                const paretoData = STOP_CODES.map(desc => {
                    const totalMins = filteredStops.filter(s => s.desc === desc).reduce((sum, s) => sum + s.mins, 0);
                    let shortName = desc.split(" - ")[1];
                    if(shortName.length > 15) shortName = shortName.substring(0, 15) + '...';
                    return { desc, code: desc.split(" - ")[0], name: shortName, mins: totalMins };
                }).filter(d => d.mins > 0).sort((a, b) => b.mins - a.mins);

                let cumulative = 0;
                const paretoChartData = paretoData.map(d => {
                    cumulative += d.mins;
                    return { ...d, accumPercentage: totalGeral > 0 ? (cumulative / totalGeral) * 100 : 0 };
                });

                const formatShortDate = (dateStr) => {
                    const parts = dateStr.split('/');
                    if (parts.length !== 3) return dateStr;
                    const d = new Date(parts[2], parts[1] - 1, parts[0]);
                    return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', '');
                };

                const maxMins = paretoChartData.length > 0 ? paretoChartData[0].mins : 0;

                const exportAnalysisToCSV = () => {
                    let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                    const headerShifts = [];
                    uniqueDates.forEach(date => {
                        shiftsConfig.forEach(shiftName => { headerShifts.push(`${date} ${shiftName}`); });
                    });
                    
                    csvContent += `Paradas;Min Totais;%;${headerShifts.join(';')}\n`;
                    rowData.forEach(row => {
                        const vals = uniqueDates.map(date => 
                            shiftsConfig.map(shift => {
                                const v = row.dateShiftVals[`${date}_${shift}`];
                                return v > 0 ? v.toFixed(2).replace('.', ',') : "0";
                            }).join(';')
                        ).join(';');
                        csvContent += `${row.desc};${row.totalMins.toFixed(2).replace('.', ',')};${row.percent.toFixed(2).replace('.', ',')}%;${vals}\n`;
                    });
                    
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `Matriz_Paradas_${settings.machineName}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`);
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);
                };

                useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [filteredStops]);

                return (
                    <div className="space-y-6 animate-in fade-in duration-300">
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
                                <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                    <i data-lucide="bar-chart-2" className="text-blue-600"></i> Análise de Paradas
                                </h2>
                                <button onClick={exportAnalysisToCSV} className="bg-blue-600 text-white font-bold py-2 px-4 rounded shadow-sm text-sm flex items-center gap-2 active:bg-blue-700 w-full md:w-auto justify-center">
                                    <i data-lucide="download"></i> Exportar Matriz Excel
                                </button>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Data Início</label>
                                    <input type="date" value={filterStart} onChange={e => setFilterStart(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50"/>
                                </div>
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Data Fim</label>
                                    <input type="date" value={filterEnd} onChange={e => setFilterEnd(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50"/>
                                </div>
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Turno Específico</label>
                                    <select value={filterShift} onChange={e => setFilterShift(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50">
                                        <option value="">Todos os Turnos</option>
                                        {settings.shifts.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-end pb-[2px]">
                                    <button onClick={() => { setFilterStart(""); setFilterEnd(""); setFilterShift(""); }} className="w-full bg-gray-100 border border-gray-300 text-gray-700 py-2 rounded text-sm font-bold flex items-center justify-center gap-1 hover:bg-gray-200">
                                        <i data-lucide="filter-x" className="w-4 h-4"></i> Limpar Filtros
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                            <h3 className="font-bold text-gray-800 mb-3 flex items-center gap-2">
                                <i data-lucide="table" className="w-4 h-4 text-blue-600"></i> Tabela Matriz
                            </h3>
                            {filteredStops.length === 0 ? (
                                <p className="text-gray-500 text-sm text-center py-6 bg-gray-50 rounded border border-dashed border-gray-300">Nenhum dado encontrado para os filtros selecionados.</p>
                            ) : (
                                <div className="overflow-x-auto pb-2">
                                    <table className="w-full text-xs border-collapse border border-gray-300">
                                        <thead className="bg-gray-100">
                                            <tr>
                                                <th className="border border-gray-300 p-2 text-left min-w-[200px]" rowSpan={2}>
                                                    <span className="block mb-1 text-[10px] text-gray-500">DIA</span>
                                                    Paradas
                                                </th>
                                                <th className="border border-gray-300 p-2" rowSpan={2}>Min</th>
                                                <th className="border border-gray-300 p-2" rowSpan={2}>%</th>
                                                {uniqueDates.map(date => (
                                                    <th key={date} className="border border-gray-300 p-1 text-center bg-gray-200" colSpan={shiftsConfig.length}>
                                                        {formatShortDate(date)}
                                                    </th>
                                                ))}
                                            </tr>
                                            <tr>
                                                {uniqueDates.map(date => (
                                                    shiftsConfig.map(shift => (
                                                        <th key={`${date}_${shift}`} className="border border-gray-300 p-1 text-center font-normal">
                                                            {shift.substring(0, 2)}
                                                        </th>
                                                    ))
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {rowData.map(row => (
                                                <tr key={row.desc} className="hover:bg-blue-50 transition-colors">
                                                    <td className="border border-gray-300 p-2 whitespace-nowrap">{row.desc}</td>
                                                    <td className="border border-gray-300 p-2 text-center font-bold text-blue-700">{row.totalMins.toFixed(0)}</td>
                                                    <td className="border border-gray-300 p-2 text-center">{row.percent.toFixed(1)}%</td>
                                                    {uniqueDates.map(date => (
                                                        shiftsConfig.map(shift => {
                                                            const val = row.dateShiftVals[`${date}_${shift}`];
                                                            return <td key={`${date}_${shift}`} className="border border-gray-300 p-2 text-center text-gray-700 font-semibold">
                                                                {val > 0 ? val.toFixed(0) : ''}
                                                            </td>
                                                        })
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>

                        {paretoChartData.length > 0 && (
                            <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div className="w-full overflow-x-auto pb-4">
                                    <h3 className="font-bold text-center text-gray-800 uppercase text-sm mb-2">
                                        GRÁFICO DE PARADAS - {settings.machineName} - {filterStart ? `${formatShortDate(new Date(filterStart).toLocaleDateString('pt-BR'))} a ` : ''} {formatShortDate(new Date().toLocaleDateString('pt-BR'))}
                                    </h3>
                                    <div className="min-w-[700px] h-[350px] relative pl-10 pr-10 pb-28 mt-4 border border-gray-100 rounded bg-white">
                                        <div className="absolute left-0 top-4 bottom-28 w-8 flex flex-col justify-between items-end text-[9px] text-gray-600 pr-1 z-10">
                                            <span>{maxMins.toFixed(0)}</span>
                                            <span>{(maxMins * 0.75).toFixed(0)}</span>
                                            <span>{(maxMins * 0.5).toFixed(0)}</span>
                                            <span>{(maxMins * 0.25).toFixed(0)}</span>
                                            <span>0</span>
                                        </div>
                                        <div className="absolute right-0 top-4 bottom-28 w-8 flex flex-col justify-between items-start text-[9px] text-gray-600 pl-1 z-10">
                                            <span>100%</span>
                                            <span>75%</span>
                                            <span>50%</span>
                                            <span>25%</span>
                                            <span>0%</span>
                                        </div>
                                        <div className="absolute inset-x-10 top-4 bottom-28 flex flex-col justify-between pointer-events-none z-0">
                                            {[...Array(5)].map((_, i) => (
                                                <div key={i} className="border-t border-gray-200 w-full h-0"></div>
                                            ))}
                                        </div>
                                        <div className="absolute inset-x-10 top-4 bottom-28 flex items-end gap-[2px] z-10">
                                            {paretoChartData.map((d) => (
                                                <div key={d.code} className="flex-1 flex flex-col items-center relative h-full justify-end group">
                                                    <div className="w-full bg-[#4472c4] border border-[#2f5597] hover:bg-[#2f5597] transition-colors relative"
                                                         style={{ height: `${(d.mins / maxMins) * 100}%` }}>
                                                        <span className="absolute -top-5 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-800">
                                                            {d.mins.toFixed(0)}
                                                        </span>
                                                    </div>
                                                    <div className="absolute top-[100%] pt-2 w-full flex justify-center">
                                                        <span className="text-[10px] text-gray-700 -rotate-90 origin-top-left transform translate-y-2 translate-x-3 whitespace-nowrap font-medium">
                                                            {d.name}
                                                        </span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="absolute inset-x-10 top-4 bottom-28 pointer-events-none z-20">
                                            <svg className="w-full h-full overflow-visible" viewBox="0 0 100 100" preserveAspectRatio="none">
                                                <polyline
                                                    points={paretoChartData.map((d, i) => `${(i + 0.5) * (100 / paretoChartData.length)},${100 - d.accumPercentage}`).join(' ')}
                                                    fill="none" stroke="#ed7d31" strokeWidth="2" vectorEffect="non-scaling-stroke" />
                                                {paretoChartData.map((d, i) => (
                                                    <circle key={i} cx={`${(i + 0.5) * (100 / paretoChartData.length)}`} cy={`${100 - d.accumPercentage}`} r="3" fill="#ed7d31" vectorEffect="non-scaling-stroke" />
                                                ))}
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            // COMPONENTE: OEE (NOVO)
            const OEEView = () => {
                const today = new Date().toISOString().split('T')[0];
                const [filterStart, setFilterStart] = useState(today);
                const [filterEnd, setFilterEnd] = useState(today);
                const [filterShift, setFilterShift] = useState("");

                const getShiftDuration = (startStr, endStr) => {
                    const [sh, sm] = startStr.split(':').map(Number);
                    const [eh, em] = endStr.split(':').map(Number);
                    let mins = (eh * 60 + em) - (sh * 60 + sm);
                    if (mins < 0) mins += 1440; 
                    return mins;
                };

                const getAvailableMinutes = () => {
                    if (!filterStart || !filterEnd) return 0;
                    const start = new Date(filterStart + 'T00:00:00');
                    const end = new Date(filterEnd + 'T00:00:00');
                    if (start > end) return 0;
                    const days = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
                    
                    let dailyMins = 0;
                    if (filterShift) {
                        const shift = settings.shifts.find(s => s.name === filterShift);
                        if (shift) dailyMins = getShiftDuration(shift.start, shift.end);
                    } else {
                        dailyMins = settings.shifts.reduce((acc, s) => acc + getShiftDuration(s.start, s.end), 0);
                    }
                    return dailyMins * days;
                };

                const tempoDisponivel = getAvailableMinutes();

                const filteredJobs = finishedJobs.filter(job => {
                    if (filterStart && new Date(job.horaInicio) < new Date(filterStart + 'T00:00:00')) return false;
                    if (filterEnd && new Date(job.horaInicio) > new Date(filterEnd + 'T23:59:59')) return false;
                    if (filterShift) {
                        if (!job.tempoPorTurno || !(job.tempoPorTurno[filterShift] > 0)) return false;
                    }
                    return true;
                });

                const filteredGlobalStops = globalStops.filter(gs => {
                    if (filterStart && new Date(gs.data) < new Date(filterStart + 'T00:00:00')) return false;
                    if (filterEnd && new Date(gs.data) > new Date(filterEnd + 'T23:59:59')) return false;
                    if (filterShift) {
                        if (!gs.tempoPorTurno || !(gs.tempoPorTurno[filterShift] > 0)) return false;
                    }
                    return true;
                });

                // Calculos de Paradas e Tempo
                let globalParadasDowntime = 0;
                filteredGlobalStops.forEach(gs => {
                    globalParadasDowntime += filterShift ? (gs.tempoPorTurno[filterShift] || 0) : parseFloat(gs.minutos);
                });

                let tempoNecessarioTotal = 0;
                let tempoRealOpTotal = 0;
                let totalParadasOPs = 0;

                const oeeRows = filteredJobs.map(job => {
                    const tpi = parseFloat(job.tempoOp) || 0;
                    const qi = parseFloat(job.qtdProduzida) || 0;
                    const tpi_x_qi = tpi * qi;
                    
                    let jobTotalTime = 0;
                    if (filterShift) {
                        jobTotalTime = job.tempoPorTurno[filterShift] || 0;
                    } else {
                        jobTotalTime = (new Date(job.horaFim) - new Date(job.horaInicio)) / 60000;
                    }

                    let jobParadasDowntime = 0;
                    job.paradas.forEach(p => {
                        // REGRA: Parada 25 NÃO É MAQUINA PARADA! É ignorada no downtime do OEE
                        if (p.cod !== "25") {
                            if (filterShift) {
                                const shiftDist = calculateTimePerShift(p.inicio, p.fim, settings.shifts);
                                jobParadasDowntime += (shiftDist[filterShift] || 0);
                            } else {
                                jobParadasDowntime += parseFloat(p.minutos);
                            }
                        }
                    });

                    globalParadasDowntime += jobParadasDowntime;
                    totalParadasOPs += jobParadasDowntime;

                    const operatingTime = Math.max(0, jobTotalTime - jobParadasDowntime);
                    
                    tempoNecessarioTotal += tpi_x_qi;
                    tempoRealOpTotal += operatingTime;

                    const mu1 = jobTotalTime > 0 ? operatingTime / jobTotalTime : 0;
                    const mu2 = operatingTime > 0 ? tpi_x_qi / operatingTime : 0;
                    const mu3 = 1.0;
                    const oee = mu1 * mu2 * mu3;

                    return {
                        id: job.id,
                        opId: `${job.ordemProducao}/${job.idFerramenta || ''}`,
                        tpi, qi, tpi_x_qi,
                        paradas: jobParadasDowntime,
                        mu1, mu2, mu3, oee
                    };
                });

                const mu1Global = tempoDisponivel > 0 ? Math.max(0, (tempoDisponivel - globalParadasDowntime) / tempoDisponivel) : 0;
                const mu2Global = tempoRealOpTotal > 0 ? tempoNecessarioTotal / tempoRealOpTotal : 0;
                const mu3Global = 1.0;
                const oeeGlobal = mu1Global * mu2Global * mu3Global;
                const quedaVel = Math.max(0, tempoRealOpTotal - tempoNecessarioTotal);

                useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [filterStart, filterEnd, filterShift]);

                return (
                    <div className="space-y-6 animate-in fade-in duration-300">
                        {/* Filtros OEE */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2 mb-4">
                                <i data-lucide="activity" className="text-blue-600"></i> Painel OEE (Overall Equipment Effectiveness)
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Data Início</label>
                                    <input type="date" value={filterStart} onChange={e => setFilterStart(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50"/>
                                </div>
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Data Fim</label>
                                    <input type="date" value={filterEnd} onChange={e => setFilterEnd(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50"/>
                                </div>
                                <div>
                                    <label className="block text-[10px] uppercase font-bold text-gray-500 mb-1">Turno Específico</label>
                                    <select value={filterShift} onChange={e => setFilterShift(e.target.value)} className="w-full rounded border-gray-300 p-2 text-sm border bg-gray-50">
                                        <option value="">Todos os Turnos</option>
                                        {settings.shifts.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}
                                    </select>
                                </div>
                                <div className="flex items-end pb-[2px]">
                                    <button onClick={() => { setFilterStart(""); setFilterEnd(""); setFilterShift(""); }} className="w-full bg-gray-100 border border-gray-300 text-gray-700 py-2 rounded text-sm font-bold flex items-center justify-center gap-1 hover:bg-gray-200">
                                        <i data-lucide="filter-x" className="w-4 h-4"></i> Limpar Filtros
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* TABELA PADRÃO EXCEL OEE */}
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                            <table className="w-full text-xs text-center border-collapse excel-table whitespace-nowrap">
                                <tbody>
                                    {/* Cabecalho Principal */}
                                    <tr>
                                        <td className="text-left font-bold bg-gray-50">Turnos</td>
                                        <td className="bg-gray-50">{filterShift ? 1 : settings.shifts.length}</td>
                                        <td className="bg-gray-50 font-bold">{tempoDisponivel}</td>
                                        <td colSpan="8" className="border-none"></td>
                                        <td className="text-right font-semibold text-[11px] text-gray-600">tempo real op</td>
                                        <td className="bg-yellow-300 font-bold text-gray-900 text-sm">{tempoRealOpTotal.toFixed(0)}</td>
                                    </tr>
                                    <tr>
                                        <td colSpan="1" className="border-none"></td>
                                        <td className="font-bold bg-gray-50 text-[11px]">µ1 Disponi</td>
                                        <td className="bg-yellow-300 font-bold text-gray-900 text-sm">{(mu1Global*100).toFixed(1)}%</td>
                                        <td className="font-bold bg-gray-50 text-[11px]">µ2 Perform</td>
                                        <td className="bg-yellow-300 font-bold text-gray-900 text-sm">{(mu2Global*100).toFixed(1)}%</td>
                                        <td className="font-bold bg-gray-50 text-[11px]">µ3 Qualida</td>
                                        <td className="bg-yellow-300 font-bold text-gray-900 text-sm">{(mu3Global*100).toFixed(1)}%</td>
                                        <td className="font-bold text-red-600 bg-gray-50 text-sm">OEE</td>
                                        <td className="bg-yellow-300 font-bold text-red-600 text-sm">{(oeeGlobal*100).toFixed(1)}%</td>
                                        <td colSpan="2" className="text-right font-semibold text-[11px] text-gray-600">tempo necessário de p</td>
                                        <td className="bg-gray-50 font-bold text-gray-900 text-sm">{tempoNecessarioTotal.toFixed(0)}</td>
                                    </tr>
                                    <tr>
                                        <td colSpan="11" className="border-none"></td>
                                        <td className="text-right font-semibold text-[11px] text-gray-600">queda vel</td>
                                        <td className="bg-yellow-300 font-bold text-gray-900 text-sm">{quedaVel.toFixed(0)}</td>
                                    </tr>

                                    {/* Titulos da Tabela de OPs */}
                                    <tr className="bg-gray-100">
                                        <th className="text-left w-64">OP / ID</th>
                                        <th>Tpi Tempo</th>
                                        <th>qi Qnt prod</th>
                                        <th>Tpi x qi</th>
                                        <th>Qnt Ref/Ret</th>
                                        <th>Σ Tempo Ref/Ret</th>
                                        <th>Paradas</th>
                                        <th className="bg-yellow-300 text-gray-900">µglobal</th>
                                        <th>µ1</th>
                                        <th>µ3</th>
                                        <th>µ2</th>
                                        <th>OEE</th>
                                        <th className="text-[10px] font-normal italic border-none bg-white"></th>
                                    </tr>

                                    {/* Linhas de OPs */}
                                    {oeeRows.length === 0 ? (
                                        <tr><td colSpan="12" className="py-8 text-gray-400">Nenhum dado encontrado para o período.</td></tr>
                                    ) : (
                                        oeeRows.map(row => (
                                            <tr key={row.id} className="hover:bg-blue-50">
                                                <td className="text-left font-medium text-gray-700">{row.opId}</td>
                                                <td>{row.tpi}</td>
                                                <td>{row.qi}</td>
                                                <td className="font-semibold text-gray-800">{row.tpi_x_qi.toFixed(0)}</td>
                                                <td className="text-gray-400">-</td>
                                                <td className="text-gray-400">-</td>
                                                <td className="text-red-600">{row.paradas > 0 ? row.paradas.toFixed(0) : ''}</td>
                                                <td className="font-bold">{(row.oee*100).toFixed(2)}%</td>
                                                <td>{row.mu1.toFixed(2)}</td>
                                                <td>{row.mu3.toFixed(2)}</td>
                                                <td>{row.mu2.toFixed(2)}</td>
                                                <td>{(row.oee*100).toFixed(1)}%</td>
                                                <td className="border-none bg-white"></td>
                                            </tr>
                                        ))
                                    )}

                                    {/* Totais do Rodape da Tabela */}
                                    {oeeRows.length > 0 && (
                                        <tr className="bg-gray-50 font-bold">
                                            <td colSpan="3" className="text-right border-none">Total:</td>
                                            <td className="text-blue-700">{tempoNecessarioTotal.toFixed(0)}</td>
                                            <td className="border-none"></td>
                                            <td className="border-none"></td>
                                            <td className="text-red-700">{totalParadasOPs.toFixed(0)}</td>
                                            <td colSpan="5" className="border-none"></td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                            <p className="text-[10px] text-gray-400 mt-3 text-right italic">
                                * Nota OEE: A Parada "25 - Afiação" não contabiliza como máquina parada na fórmula do OEE, sendo tratada como Tempo Real OP.
                            </p>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-blue-800 text-white p-4 shadow-md sticky top-0 z-30 flex justify-between items-center">
                        <h1 className="text-lg font-bold flex items-center gap-2">
                            <i data-lucide="monitor"></i> Ficha {settings.machineName} Digital
                        </h1>
                    </header>

                    <main className={`p-4 mx-auto space-y-4 ${view === 'analysis' || view === 'oee' ? 'max-w-6xl' : 'max-w-lg'}`}>
                        {view === 'new' && <NewJobForm />}
                        {view === 'settings' && <SettingsView />}
                        {view === 'analysis' && <AnalysisView />}
                        {view === 'oee' && <OEEView />}

                        {view === 'active' && (
                            <>
                                <div>
                                    <button onClick={() => setView('new')} className="w-full bg-blue-600 text-white font-bold text-lg p-4 rounded-xl shadow-sm flex justify-center items-center gap-2 active:bg-blue-700 transition-colors">
                                        <i data-lucide="plus-circle"></i> Iniciar Nova Produção
                                    </button>
                                    <button onClick={() => setIsGlobalStopOpen(true)} className="w-full mt-3 bg-amber-100 text-amber-800 border border-amber-300 font-bold text-sm p-3 rounded-xl shadow-sm flex justify-center items-center gap-2 active:bg-amber-200 transition-colors">
                                        <i data-lucide="alert-triangle" className="w-4 h-4"></i> Apontar Falta de Matéria (Tempo Solto)
                                    </button>
                                </div>

                                {activeJobs.length === 0 ? (
                                    <div className="text-center text-gray-500 mt-10 p-6 bg-white rounded-xl border border-dashed border-gray-300 shadow-sm">
                                        <i data-lucide="coffee" className="mx-auto h-12 w-12 text-gray-400 mb-2"></i>
                                        <p>Nenhuma OP rodando no momento.</p>
                                    </div>
                                ) : (
                                    activeJobs.map(job => (
                                        <div key={job.id} className="p-4 rounded-xl shadow-sm border-l-4 bg-white border-green-500">
                                            <div className="flex justify-between items-start mb-2">
                                                <div>
                                                    <span className="text-xs font-bold text-gray-500 uppercase tracking-wider">OP: {job.ordemProducao}</span>
                                                    <h3 className="text-lg font-bold text-gray-800">Ferra: {job.idFerramenta || 'N/A'}</h3>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="bg-blue-50 text-blue-700 text-[10px] px-2 py-1 rounded border border-blue-200 flex items-center gap-1 font-bold">
                                                        <i data-lucide="clock" className="w-3 h-3"></i> Rodando
                                                    </span>
                                                    <button onClick={() => handleDeleteJob(job.id)} className="text-red-500 bg-red-50 p-1.5 rounded hover:bg-red-100" title="Excluir OP">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="text-sm text-gray-600 mb-4 grid grid-cols-2 gap-2">
                                                <p><i data-lucide="calendar" className="inline w-4 h-4 mr-1"></i> {formatDate(job.horaInicio)}</p>
                                                <p><i data-lucide="play" className="inline w-4 h-4 mr-1 text-green-500"></i> Início: <span className="font-semibold text-gray-800">{formatTime(job.horaInicio)}</span></p>
                                            </div>

                                            <div className="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200 grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">Qtd. Produzida</label>
                                                    <input type="number" inputMode="numeric" pattern="[0-9]*" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.qtdProduzida} onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, qtdProduzida: e.target.value} : j))} />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">Tempo OP (min)</label>
                                                    <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.tempoOp} onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, tempoOp: e.target.value} : j))} />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">T. Apalpamento</label>
                                                    <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.tempoApalpamento} onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, tempoApalpamento: e.target.value} : j))} />
                                                </div>
                                                <div>
                                                    <label className="block text-[11px] font-medium text-gray-600 mb-1">T. Afiação Real</label>
                                                    <input type="number" inputMode="decimal" step="any" enterKeyHint="next" className="w-full rounded border-gray-300 text-sm p-2 border focus:ring-blue-500 focus:border-blue-500 bg-white shadow-inner"
                                                        value={job.tempoAfiacao} onChange={(e) => setJobs(jobs.map(j => j.id === job.id ? {...j, tempoAfiacao: e.target.value} : j))} />
                                                </div>
                                            </div>

                                            <div className="flex gap-2">
                                                <button onClick={() => setActiveStopJobId(job.id)} className="flex-1 bg-amber-100 text-amber-800 border border-amber-300 p-3 rounded-lg font-semibold text-sm active:bg-amber-200 flex justify-center items-center gap-1">
                                                    <i data-lucide="alert-triangle" className="w-4 h-4"></i> Parada
                                                </button>
                                                <button onClick={() => setFinishingJobId(job.id)} className="flex-1 bg-gray-800 text-white p-3 rounded-lg font-semibold text-sm active:bg-gray-900 flex justify-center items-center gap-1">
                                                    <i data-lucide="check-circle" className="w-4 h-4"></i> Finalizar
                                                </button>
                                            </div>

                                            {job.paradas.length > 0 && (
                                                <div className="mt-4 border-t pt-2">
                                                    <p className="text-xs text-gray-500 font-semibold mb-1">Paradas registradas:</p>
                                                    <ul className="text-xs text-gray-600 space-y-1">
                                                        {job.paradas.map((p, i) => (
                                                            <li key={i}>• {p.desc} - {p.minutos} min</li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </>
                        )}

                        {view === 'history' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={exportToCSV} className="w-full bg-green-600 text-white font-bold py-2 rounded-lg flex flex-col justify-center items-center gap-1 active:bg-green-700 shadow-sm text-xs">
                                        <i data-lucide="file-spreadsheet" className="w-5 h-5"></i> CSV Excel
                                    </button>
                                    <button onClick={exportToJSON} className="w-full bg-blue-600 text-white font-bold py-2 rounded-lg flex flex-col justify-center items-center gap-1 active:bg-blue-700 shadow-sm text-xs">
                                        <i data-lucide="download-cloud" className="w-5 h-5"></i> Backup JSON
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="w-full bg-amber-500 text-white font-bold py-2 rounded-lg flex flex-col justify-center items-center gap-1 active:bg-amber-600 shadow-sm text-xs">
                                        <i data-lucide="upload-cloud" className="w-5 h-5"></i> Restaurar
                                    </button>
                                    <input type="file" accept=".json" style={{ display: 'none' }} ref={fileInputRef} onChange={handleImportJSON} />
                                </div>
                                
                                <div className="grid grid-cols-4 gap-1 text-center bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                                    <div>
                                        <p className="text-[9px] text-gray-500 uppercase font-bold">OPs</p>
                                        <p className="text-lg font-bold text-blue-600">{histSummary.ops}</p>
                                    </div>
                                    <div className="border-l border-gray-200">
                                        <p className="text-[9px] text-gray-500 uppercase font-bold">Peças</p>
                                        <p className="text-lg font-bold text-green-600">{histSummary.pecas}</p>
                                    </div>
                                    <div className="border-l border-gray-200">
                                        <p className="text-[9px] text-gray-500 uppercase font-bold">T. OP</p>
                                        <p className="text-lg font-bold text-orange-600">{histSummary.tempoTotal.toFixed(0)}m</p>
                                    </div>
                                    <div className="border-l border-gray-200">
                                        <p className="text-[9px] text-gray-500 uppercase font-bold">Falt. Mat.</p>
                                        <p className="text-lg font-bold text-red-600">{totalFaltaMateria.toFixed(0)}m</p>
                                    </div>
                                </div>

                                {finishedJobs.length === 0 && globalStops.length === 0 ? (
                                    <p className="text-center text-gray-500 mt-6 bg-white p-6 rounded-xl border border-gray-200">Nenhum histórico salvo.</p>
                                ) : (
                                    <>
                                        {finishedJobs.map(job => (
                                            <div key={job.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 relative">
                                                <div className="absolute top-3 right-3 flex gap-2">
                                                    <button onClick={() => setEditingHistoryJobId(job.id)} className="text-blue-600 bg-blue-50 p-2 rounded-lg active:bg-blue-100 flex items-center gap-1 text-xs font-bold" title="Editar OP">
                                                        <i data-lucide="edit" className="w-3 h-3"></i> Editar
                                                    </button>
                                                    <button onClick={() => handleDeleteJob(job.id)} className="text-red-600 bg-red-50 p-2 rounded-lg active:bg-red-100 flex items-center gap-1 text-xs font-bold" title="Excluir OP">
                                                        <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                    </button>
                                                </div>
                                                
                                                <div className="mb-2 pr-24">
                                                    <span className="font-bold text-gray-800 block text-lg">OP: {job.ordemProducao}</span>
                                                    <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded border">Ferra: {job.idFerramenta}</span>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 gap-y-1 text-xs text-gray-600 mt-3 border-t pt-2">
                                                    <p><b>Data:</b> {formatDate(job.data)}</p>
                                                    <p><b>Início:</b> {formatTime(job.horaInicio)}</p>
                                                    <p><b>Fim:</b> {formatTime(job.horaFim)}</p>
                                                    <p><b>Plan:</b> {job.qtdPlanejada} pçs</p>
                                                    <p className="text-green-600 font-bold col-span-2"><b>Produzido:</b> {job.qtdProduzida} pçs</p>
                                                </div>

                                                {job.tempoPorTurno && Object.keys(job.tempoPorTurno).length > 0 && (
                                                    <div className="mt-2 bg-blue-50 p-2 rounded border border-blue-100 text-[10px] text-blue-800 flex flex-wrap gap-2">
                                                        <span className="font-bold w-full">Distribuição de Tempo:</span>
                                                        {Object.entries(job.tempoPorTurno).map(([nomeTurno, min]) => (
                                                            min > 0 && <span key={nomeTurno} className="bg-white px-2 py-0.5 rounded border border-blue-200">{nomeTurno}: {min.toFixed(0)}m</span>
                                                        ))}
                                                    </div>
                                                )}
                                                
                                                <div className="mt-2 bg-gray-50 p-2 rounded text-xs text-gray-600 grid grid-cols-3 gap-1 text-center border border-gray-100">
                                                    <div><span className="block font-semibold">T. OP</span> {job.tempoOp||'-'}m</div>
                                                    <div><span className="block font-semibold">T. Apalp.</span> {job.tempoApalpamento||'-'}</div>
                                                    <div><span className="block font-semibold">T. Afiac.</span> {job.tempoAfiacao||'-'}</div>
                                                </div>

                                                {job.paradas.length > 0 && (
                                                    <div className="mt-3 border-t pt-2">
                                                        <p className="text-[11px] text-gray-500 font-bold mb-1">Paradas:</p>
                                                        <ul className="text-[11px] text-gray-500 space-y-1">
                                                            {job.paradas.map((p, i) => (
                                                                <li key={i}>• {p.desc} - {p.minutos} min</li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                )}
                                            </div>
                                        ))}

                                        {globalStops.length > 0 && (
                                            <div className="mt-6">
                                                <h3 className="font-bold text-gray-700 mb-2 text-sm flex items-center gap-1">
                                                    <i data-lucide="alert-triangle" className="w-4 h-4 text-amber-500"></i>
                                                    Falta de Matéria (Tempo Solto)
                                                </h3>
                                                {globalStops.map(gs => (
                                                    <div key={gs.id} className="bg-amber-50 p-4 rounded-lg border border-amber-200 mb-3 relative">
                                                        <div className="absolute top-3 right-3 flex gap-2">
                                                            <button onClick={() => setEditingGlobalStopId(gs.id)} className="text-amber-700 bg-amber-200/50 p-2 rounded-lg active:bg-amber-200 flex items-center gap-1 text-xs font-bold" title="Editar Registro">
                                                                <i data-lucide="edit" className="w-3 h-3"></i> Editar
                                                            </button>
                                                            <button onClick={() => {
                                                                if(confirm("Excluir este registro?")) setGlobalStops(globalStops.filter(g => g.id !== gs.id));
                                                            }} className="text-red-500 p-2 bg-white rounded-lg shadow-sm border border-amber-200 hover:bg-red-50">
                                                                <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                            </button>
                                                        </div>
                                                        <div className="text-xs text-amber-800 pr-24 mt-1">
                                                            <span className="font-bold block text-sm mb-1">{formatDate(gs.data)}</span>
                                                            <span className="block font-medium">Parada 7: {gs.minutos} min totais</span>
                                                            <div className="mt-2 flex flex-wrap gap-2 text-[10px] font-semibold opacity-90">
                                                                {gs.tempoPorTurno && Object.entries(gs.tempoPorTurno).map(([nomeTurno, min]) => (
                                                                    min > 0 && <span key={nomeTurno} className="bg-amber-100 px-2 py-0.5 rounded border border-amber-300">[{nomeTurno}: {min.toFixed(0)}m]</span>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </>
                                )}
                                <div className="pt-4 border-t border-gray-300">
                                    <button onClick={() => {
                                        if(confirm('Tem certeza que deseja apagar todo o histórico? Exporte para Backup(JSON) ou Excel(CSV) antes de fazer isso!')) {
                                            setJobs(activeJobs);
                                            setGlobalStops([]);
                                        }
                                    }} className="w-full text-red-600 bg-red-50 p-3 rounded-lg text-sm font-bold border border-red-200">Apagar Histórico</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* BARRA DE NAVEGAÇÃO INFERIOR */}
                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-between px-1 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
                        <button onClick={() => setView('active')} className={`flex flex-col items-center p-2 w-full ${view === 'active' || view === 'new' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i data-lucide="play" className="w-5 h-5 mb-1"></i>
                            <span className="text-[9px] font-bold">Produção</span>
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center p-2 w-full ${view === 'history' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i data-lucide="history" className="w-5 h-5 mb-1"></i>
                            <span className="text-[9px] font-bold">Histórico</span>
                        </button>
                        <button onClick={() => setView('analysis')} className={`flex flex-col items-center p-2 w-full ${view === 'analysis' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i data-lucide="bar-chart-2" className="w-5 h-5 mb-1"></i>
                            <span className="text-[9px] font-bold">Análise</span>
                        </button>
                        <button onClick={() => setView('oee')} className={`flex flex-col items-center p-2 w-full ${view === 'oee' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i data-lucide="activity" className="w-5 h-5 mb-1"></i>
                            <span className="text-[9px] font-bold">OEE</span>
                        </button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center p-2 w-full ${view === 'settings' ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}>
                            <i data-lucide="settings" className="w-5 h-5 mb-1"></i>
                            <span className="text-[9px] font-bold">Ajustes</span>
                        </button>
                    </nav>

                    {isGlobalStopOpen && <GlobalStopModal />}
                    {activeStopJobId && <StopModal />}
                    {finishingJobId && <FinishJobModal />}
                    {editingHistoryJobId && <EditHistoryModal />}
                    {editingGlobalStopId && <EditGlobalStopModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
